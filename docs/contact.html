<!DOCTYPE HTML>
<html lang="ja">
    <head>
        <title>Contact - Yuga's Lab</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <meta name="description" content="Yuga's Lab へのお問い合わせページです。" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Monsieur+La+Doulaise&display=swap');

            html, body, #wrapper {
                background-color: #0b0e11 !important;
                background-image: none !important;
                font-family: "Inter", "Noto Sans JP", sans-serif !important;
            }
            .bg, #bg { display: none !important; }
            #navPanelToggle, #navPanel { display: none !important; }
            #custom-parallax-bg {
                position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100vh !important;
                background-image: url("images/bg.jpg") !important; background-size: cover !important;
                background-repeat: no-repeat !important; background-position: center 40% !important;
                z-index: 0 !important; transform: scale(1.15) !important; will-change: background-position;
            }
            #wrapper { position: relative !important; z-index: 2 !important; background: transparent !important; }
            
            .global-header {
                position: fixed; top: 0; left: 0; width: 100%; height: 60px;
                background: rgba(11, 14, 17, 0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center;
                padding: 0 2.5rem; box-sizing: border-box; z-index: 100;
            }
            .header-logo-svg-wrapper { text-decoration: none !important; border-bottom: none !important; display: inline-block; height: 45px; box-sizing: border-box; }
            .header-signature-svg { width: 145px; height: auto; overflow: visible; }
            .signature-text-node { font-family: 'Monsieur La Doulaise', cursive !important; font-size: 32px; fill: #ffffff; opacity: 0.95; }

            .menu-trigger-btn {
                background: transparent !important; border: none !important; cursor: pointer;
                display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 7px;
                width: 30px; height: 22px; padding: 0 !important; box-shadow: none !important; opacity: 0.8 !important; transition: opacity 0.2s ease;
            }
            .menu-trigger-btn:hover { opacity: 1 !important; }
            .menu-trigger-btn span { display: block; height: 1px; background-color: #ffffff !important; }
            .menu-trigger-btn span:nth-child(1) { width: 100%; }
            .menu-trigger-btn span:nth-child(2) { width: 60%; transition: width 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
            .menu-trigger-btn:hover span:nth-child(2) { width: 100%; }

            .side-nav {
                position: fixed; top: 0; right: -280px; width: 280px; height: 100vh; background: rgba(11, 14, 17, 0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
                box-shadow: -15px 0 45px rgba(0, 0, 0, 0.6); z-index: 200; padding: 6rem 2.2rem; box-sizing: border-box; transition: right 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); border-left: 1px solid rgba(255, 255, 255, 0.08);
            }
            .side-nav.open { right: 0; }

            .side-nav-close {
                position: absolute; top: 22px; right: 2.2rem;
                background: transparent !important; border: none !important; box-shadow: none !important; outline: none !important;
                color: #ffffff !important; font-size: 1.4rem; cursor: pointer; opacity: 0.5; padding: 0 !important; transition: opacity 0.2s ease;
            }
            .side-nav-close:hover { opacity: 1; }

            .side-menu-list { list-style: none; padding: 0; margin: 0; }
            .side-menu-section { margin-bottom: 2.5rem; }
            .side-menu-category { display: block; font-size: 0.72rem; color: #94a3b8 !important; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 0.4rem; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

            .side-menu-item { margin-bottom: 1rem; }
            .side-menu-link { color: #ffffff !important; text-decoration: none !important; font-size: 0.95rem; font-weight: 600; border-bottom: none !important; transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); display: inline-flex; align-items: center; justify-content: space-between; width: 100%; opacity: 0.85; }
            .side-menu-link:hover:not(.status-coming) { opacity: 1 !important; transform: translateX(6px); color: #ffffff !important; text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); }
            .side-menu-link.status-coming { color: rgba(255, 255, 255, 0.2) !important; cursor: not-allowed !important; pointer-events: none !important; }

            .nav-badge { font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 4px; letter-spacing: 0.05em; }
            .nav-badge.active { background: rgba(214, 138, 76, 0.15); color: #d68a4c; border: 1px solid rgba(214, 138, 76, 0.35); }
            .nav-badge.coming { background: rgba(255, 255, 255, 0.03); color: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.05); }

            #main { border: none !important; background-color: transparent !important; max-width: 750px; margin: 0 auto !important; padding: 8rem 2rem 12rem 2rem !important; position: relative; z-index: 3; }
            .contact-card { position: relative; background: rgba(255, 255, 255, 0.98) !important; border: 1px solid rgba(0, 0, 0, 0.05) !important; border-radius: 14px !important; box-shadow: 0 25px 55px rgba(0, 0, 0, 0.2); padding: 5rem 3.5rem 4rem 3.5rem !important; box-sizing: border-box !important; }
            .contact-card h1 { font-size: 2.4rem !important; font-weight: 700 !important; color: #11161b !important; text-transform: none !important; letter-spacing: normal !important; overflow-wrap: break-word; word-break: break-word; }
            @media screen and (max-width: 736px) {
                #main { padding: 6rem 1.25rem 8rem 1.25rem !important; }
                .contact-card { padding: 3.5rem 1.5rem 2.5rem 1.5rem !important; }
                .global-header { padding: 0 1.5rem; }
            }
            
            .form-group { margin-bottom: 2rem; text-align: left; }
            .form-group label { display: block; font-size: 0.82rem; font-weight: 700; color: #11161b; margin-bottom: 0.6rem; text-transform: uppercase; }
            .form-control {
                width: 100%; background: #f8fafc !important; color: #0f172a !important; border: 1px solid #e2e8f0 !important; border-radius: 6px !important;
                padding: 0.8rem 1rem !important; font-size: 0.95rem !important; transition: all 0.2s ease;
            }
            .form-control:focus { border-color: #11161b !important; background: #ffffff !important; outline: none; }
            textarea.form-control { min-height: 160px; }

            .action-container { display: flex; justify-content: center; margin-top: 3.5rem; }
            .submit-btn { background-color: #11161b !important; color: #ffffff !important; border: 1px solid #11161b !important; border-radius: 5px !important; font-weight: 700 !important; font-size: 0.85rem !important; width: 240px !important; height: 3.2rem !important; cursor: pointer; transition: all 0.2s; }
            .submit-btn:hover { background-color: #334155 !important; transform: translateY(-2px); }
        </style>
    </head>
    <body class="is-preload">
        <div id="custom-parallax-bg"></div>
        <div id="wrapper">
            <header class="global-header" style="opacity: 1 !important; transform: translateY(0) !important; pointer-events: auto !important;">
                <a href="index.html" class="header-logo-svg-wrapper">
                    <svg class="header-signature-svg" viewBox="0 0 160 45" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="5,12 12,6 19,12 12,18" fill="none" stroke="#ffffff" stroke-width="1.1" stroke-linejoin="round" />
                        <path d="M 5,12 C -2,26 28,38 70,38 L 155,38" fill="none" stroke="url(#line-fade)" stroke-width="1" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
                                <stop offset="70%" stop-color="rgba(255,255,255,0.25)" />
                                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                            </linearGradient>
                        </defs>
                        <text x="28" y="32" class="signature-text-node">Yuga's Lab.</text>
                    </svg>
                </a>
                <div class="header-right"><button class="menu-trigger-btn" id="menu-open" aria-label="メニューを開く"><span></span><span></span></button></div>
            </header>

            <nav class="side-nav" id="side-nav">
                <button class="side-nav-close" id="menu-close" aria-label="メニューを閉じる">✕</button>
                <ul class="side-menu-list">
                    <li class="side-menu-section">
                        <span class="side-menu-category">Navigation</span>
                        <div class="side-menu-item"><a href="index.html" class="side-menu-link">HOME</a></div>
                        <div class="side-menu-item"><a href="contact.html" class="side-menu-link">CONTACT</a></div>
                    </li>
                    <li class="side-menu-section">
                        <span class="side-menu-category">Applications</span>
                        <div class="side-menu-item"><a href="audioswitcher.html" class="side-menu-link">AudioSwitcher <span class="nav-badge active">LATEST</span></a></div>
                        <div class="side-menu-item"><a href="meatcam.html" class="side-menu-link">MeatCam <span class="nav-badge active">IN DEV</span></a></div>
                    </li>
                </ul>
            </nav>

            <div id="main">
                <div class="contact-card">
                    <h1>Contact</h1>
                    <span class="subtitle">Get in touch for questions or feedback</span>
                    
                    <!-- 🛠️ 変更：Formspreeのアクションを直挿入 -->
                    <form action="https://formspree.io/f/xkoldvjp" method="POST">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" class="form-control" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="_replyto" class="form-control" required placeholder="your.email@example.com">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control" required placeholder="Write your message here..."></textarea>
                        </div>
                        <div class="action-container">
                            <button type="submit" class="submit-btn">SEND MESSAGE</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                var sideNav = document.getElementById('side-nav');
                document.getElementById('menu-open').addEventListener('click', function() { sideNav.classList.add('open'); });
                document.getElementById('menu-close').addEventListener('click', function() { sideNav.classList.remove('open'); });
                document.addEventListener('click', function(e) { if (!sideNav.contains(e.target) && !document.getElementById('menu-open').contains(e.target)) sideNav.classList.remove('open'); });
            });
        </script>
    </body>
</html>
