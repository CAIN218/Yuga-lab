<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480">
  <defs>
    <linearGradient id="lm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0918" />
      <stop offset="55%" stop-color="#1b1531" />
      <stop offset="100%" stop-color="#2c2450" />
    </linearGradient>
    <radialGradient id="lm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcf8c" stop-opacity="0.55" />
      <stop offset="45%" stop-color="#ffb454" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="960" height="480" fill="url(#lm-bg)" />

  <!-- ambient glow behind the sun glyph -->
  <circle cx="330" cy="240" r="190" fill="url(#lm-glow)" />

  <!-- sun / brightness glyph, matching the app's tray icon -->
  <g>
    <circle cx="330" cy="240" r="64" fill="#f8f6ff" />
    <g stroke="#f8f6ff" stroke-width="18" stroke-linecap="round">
      <line x1="330" y1="108" x2="330" y2="140" />
      <line x1="330" y1="340" x2="330" y2="372" />
      <line x1="198" y1="240" x2="230" y2="240" />
      <line x1="430" y1="240" x2="462" y2="240" />
      <line x1="236" y1="146" x2="258" y2="168" />
      <line x1="402" y1="312" x2="424" y2="334" />
      <line x1="424" y1="146" x2="402" y2="168" />
      <line x1="258" y1="312" x2="236" y2="334" />
    </g>
  </g>

  <!-- slider motif echoing the app's own panel UI -->
  <g>
    <rect x="560" y="164" width="330" height="10" rx="5" fill="#2c2450" />
    <rect x="560" y="164" width="230" height="10" rx="5" fill="#ffb454" />
    <circle cx="790" cy="169" r="15" fill="#f8f6ff" stroke="#ffb454" stroke-width="4" />

    <rect x="560" y="222" width="330" height="10" rx="5" fill="#2c2450" />
    <rect x="560" y="222" width="140" height="10" rx="5" fill="#ffb454" />
    <circle cx="700" cy="227" r="15" fill="#f8f6ff" stroke="#ffb454" stroke-width="4" />

    <rect x="560" y="280" width="330" height="10" rx="5" fill="#2c2450" />
    <rect x="560" y="280" width="290" height="10" rx="5" fill="#ffb454" />
    <circle cx="850" cy="285" r="15" fill="#f8f6ff" stroke="#ffb454" stroke-width="4" />
  </g>
</svg>
