<!DOCTYPE HTML>
<html>
    <head>
        <title>Contact - Yuga's Lab</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Monsieur+La+Doulaise&display=swap');

            html, body, #wrapper {
                background-color: #0b0e11 !important;
                background-image: none !important;
                font-family: "Inter", "Noto Sans JP", sans-serif !important;
            }
            .bg, #bg { display: none !important; }
            #custom-parallax-bg {
                position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100vh !important;
                background-image: url("images/bg.jpg") !important; background-size: cover !important;
                background-repeat: no-repeat !important; background-position: center 40% !important;
                z-index: 0 !important; transform: scale(1.15) !important; will-change: background-position;
            }
            #wrapper { position: relative !important; z-index: 2 !important; background: transparent !important; }
            
            .global-header {
                position: fixed; top: 0; left: 0; width: 100%; height: 60px;
                background: rgba(11, 14, 17, 0.92); backdrop-filter: blur(16px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center;
                padding: 0 2.5rem; box-sizing: border-box; z-index: 100;
            }
            #main { border: none !important; background-color: transparent !important; max-width: 750px; margin: 0 auto !important; padding: 8rem 2rem 12rem 2rem !important; position: relative; z-index: 3; }
            .contact-card { position: relative; background: rgba(255, 255, 255, 0.98) !important; border: 1px solid rgba(0, 0, 0, 0.05) !important; border-radius: 14px !important; box-shadow: 0 25px 55px rgba(0, 0, 0, 0.2); padding: 5rem 3.5rem 4rem 3.5rem !important; }
            
            .form-group { margin-bottom: 2rem; text-align: left; }
            .form-group label { display: block; font-size: 0.82rem; font-weight: 700; color: #11161b; margin-bottom: 0.6rem; text-transform: uppercase; }
            .form-control {
                width: 100%; background: #f8fafc !important; color: #0f172a !important; border: 1px solid #e2e8f0 !important; border-radius: 6px !important;
                padding: 0.8rem 1rem !important; font-size: 0.95rem !important; transition: all 0.2s ease;
            }
            .form-control:focus { border-color: #11161b !important; background: #ffffff !important; outline: none; }
            textarea.form-control { min-height: 160px; }

            .action-container { display: flex; justify-content: center; margin-top: 3.5rem; }
            .submit-btn { background-color: #11161b !important; color: #ffffff !important; border: 1px solid #11161b !important; border-radius: 5px !important; font-weight: 700 !important; font-size: 0.85rem !important; width: 240px !important; height: 3.2rem !important; cursor: pointer; transition: all 0.2s; }
            .submit-btn:hover { background-color: #334155 !important; transform: translateY(-2px); }
        </style>
    </head>
    <body class="is-preload">
        <div id="custom-parallax-bg"></div>
        <div id="wrapper">
            <header class="global-header" style="opacity: 1 !important; transform: translateY(0) !important; pointer-events: auto !important;">
                <a href="index.html" style="text-decoration: none !important;">
                    <span style="font-family: 'Monsieur La Doulaise', cursive; font-size: 24px; color: #ffffff;">Yuga's Lab.</span>
                </a>
            </header>
            <div id="main">
                <div class="contact-card">
                    <h1>Contact</h1>
                    <span class="subtitle">Get in touch for questions or feedback</span>
                    
                    <!-- 🛠️ 変更：Formspreeのアクションを直挿入 -->
                    <form action="https://formspree.io/f/xkoldvjp" method="POST">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" class="form-control" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="_replyto" class="form-control" required placeholder="your.email@example.com">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control" required placeholder="Write your message here..."></textarea>
                        </div>
                        <div class="action-container">
                            <button type="submit" class="submit-btn">SEND MESSAGE</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
